<div class="page-header">

    <div>

        <h1 class="page-title">Add Product</h1>

        <p class="page-subtitle">

            Create a new product for your store.

        </p>

    </div>

    <button
        class="btn btn-secondary"
        onclick="loadPage('products')"
    >

        <i class="fas fa-arrow-left"></i>

        Back

    </button>

</div>

<form id="productForm" class="form">

    <div class="form-row">

        <div class="form-control">

            <label>Product Name</label>

            <input
                type="text"
                id="productName"
                required
            >

        </div>

        <div class="form-control">

            <label>Slug</label>

            <input
                type="text"
                id="productSlug"
                readonly
            >

        </div>

    </div>

    <div class="form-control">

        <label>Description</label>

        <textarea
            id="productDescription"
        ></textarea>

    </div>

    <div class="form-row">

        <div class="form-control">

            <label>Category</label>

            <select
                id="productCategory"
                required
            ></select>

        </div>

        <div class="form-control">

            <label>Price (KSh)</label>

            <input
                type="number"
                id="productPrice"
                min="0"
                step="0.01"
                required
            >

        </div>

    </div>

    <div class="form-row">

        <div class="form-control">

            <label>Stock</label>

            <input
                type="number"
                id="productStock"
                min="0"
                value="0"
            >

        </div>

        <div class="form-control switches">

            <label>

                <input
                    type="checkbox"
                    id="featured"
                >

                Featured Product

            </label>

            <label>

                <input
                    type="checkbox"
                    id="active"
                    checked
                >

                Active Product

            </label>

        </div>

    </div>

    <div class="form-control">

        <label>Product Images</label>

        <input

            type="file"

            id="productImages"

            accept="image/*"

            multiple

        >

    </div>

    <div
        id="imagePreview"
        class="image-preview-grid"
    >

    </div>

    <br>

    <button
        class="btn btn-primary"
        type="submit"
    >

        Save Product

    </button>

</form>
