<div class="page-header">

    <div>

        <h1 class="page-title">Add Product</h1>

        <p class="page-subtitle">

            Create a new product for your store.

        </p>

    </div>

    <button
        class="btn btn-secondary"
        onclick="loadPage('products')"
    >

        <i class="fas fa-arrow-left"></i>

        Back

    </button>

</div>

<form id="productForm" class="form product-editor-form">

    <section class="product-editor-card">

        <div class="product-editor-section-header">

            <div>

                <h2>Product Details</h2>

                <p>Name, description, category, and pricing information.</p>

            </div>

        </div>

    <div class="form-row product-editor-grid">

        <div class="form-control">

            <label>Product Name</label>

            <input
                type="text"
                id="productName"
                required
            >

        </div>

        <div class="form-control">

            <label>Slug</label>

            <input
                type="text"
                id="productSlug"
                readonly
            >

        </div>

    </div>

    <div class="form-control product-editor-full">

        <label>Description</label>

        <textarea
            id="productDescription"
        ></textarea>

    </div>

    <div class="form-row product-editor-grid">

        <div class="form-control">

            <label>Category</label>

            <select
                id="productCategory"
                required
            ></select>

        </div>

        <div class="form-control">

            <label>Price (KSh)</label>

            <input
                type="number"
                id="productPrice"
                min="0"
                step="0.01"
                required
            >

        </div>

    </div>

    <div class="form-row product-editor-grid product-editor-stock-row">

        <div class="form-control">

            <label>Stock</label>

            <input
                type="number"
                id="productStock"
                min="0"
                value="0"
            >

        </div>

        <div class="form-control switches product-status-options">

            <label>

                <input
                    type="checkbox"
                    id="featured"
                >

                Featured Product

            </label>

            <label>

                <input
                    type="checkbox"
                    id="newArrival"
                >

                New Arrival

            </label>

            <label>

                <input
                    type="checkbox"
                    id="active"
                    checked
                >

                Active Product

            </label>

        </div>

    </div>

    <div class="form-control product-editor-full">

        <label>Variant Stock</label>

        <textarea
            id="productVariants"
            placeholder="Carbon Grey, S, 5&#10;Carbon Grey, M, 8&#10;Midnight Black, S, 4"
        ></textarea>

        <small>Optional. Enter one variant per line as: Color, Size, Stock.</small>

    </div>

    <div class="form-control product-editor-full">

        <label>Show Product In</label>

        <div class="product-audience-options">

            <label>
                <input type="checkbox" name="productAudience" value="men">
                Men
            </label>

            <label>
                <input type="checkbox" name="productAudience" value="women">
                Women
            </label>

            <label>
                <input type="checkbox" name="productAudience" value="kids">
                Kids
            </label>

        </div>

    </div>

    </section>

    <section class="product-editor-card">

        <div class="product-editor-section-header">

            <div>

                <h2>Product Images</h2>

                <p>Upload one or more product photos. The first image becomes primary.</p>

            </div>

        </div>

    <div class="form-control product-upload-control">

        <label>Product Images</label>

        <label class="product-upload-box" for="productImages">

            <i class="fas fa-cloud-arrow-up"></i>

            <span>Choose product images</span>

            <small>PNG, JPG, or WebP files</small>

        </label>

        <input

            type="file"

            id="productImages"

            accept="image/*"

            multiple

        >

    </div>

    <div
        id="imagePreview"
        class="image-preview-grid"
    >

    </div>

    </section>

    <div class="product-editor-actions">

        <button
            class="btn btn-secondary"
            type="button"
            onclick="loadPage('products')"
        >

            Cancel

        </button>

        <button
            class="btn btn-primary"
            type="submit"
        >

            Save Product

        </button>

    </div>

</form>
