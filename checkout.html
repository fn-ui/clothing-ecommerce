<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Checkout — STUDIO_FIT</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Minimal Checkout Header -->
  <header class="checkout-minimal-header">
    <div class="brand-logo"><a href="index.html">STUDIO_FIT</a></div>
    <div class="secure-badge">🔒 Secure Checkout</div>
  </header>

  <!-- Split Screen Checkout Frame -->
  <main class="checkout-container">
    
    <!-- Left Form Workspace: Shipping & Billing Details -->
    <section class="checkout-form-section">
      <form class="checkout-form" onsubmit="event.preventDefault(); alert('Order Placed Successfully!');">
        
        <div class="form-block">
          <h3>Contact Information</h3>
          <div class="input-row">
            <input type="email" placeholder="Email address" required autocomplete="email">
          </div>
        </div>

        <div class="form-block">
          <h3>Shipping Address</h3>
          <div class="input-grid-2">
            <input type="text" placeholder="First name" required autocomplete="given-name">
            <input type="text" placeholder="Last name" required autocomplete="family-name">
          </div>
          <div class="input-row">
            <input type="text" placeholder="Address" required autocomplete="shipping street-address">
          </div>
          <div class="input-grid-3">
            <input type="text" placeholder="City" required autocomplete="shipping address-level2">
            <input type="text" placeholder="Postal code" required autocomplete="shipping postal-code">
            <input type="text" placeholder="Country" required autocomplete="shipping country-name">
          </div>
        </div>

        <div class="form-block">
          <h3>Payment Method</h3>
          <div class="payment-card-mock">
            <div class="input-row">
              <input type="text" placeholder="Card number" required autocomplete="cc-number">
            </div>
            <div class="input-grid-2">
              <input type="text" placeholder="Expiration date (MM / YY)" required autocomplete="cc-exp">
              <input type="text" placeholder="Security code (CVV)" required autocomplete="cc-csc">
            </div>
          </div>
        </div>

        <button type="submit" class="btn-submit-order">Place Order &rarr;</button>
      </form>
    </section>

    <!-- Right Summary Workspace: Subtotal Calculations -->
    <aside class="checkout-summary-section">
      <div class="summary-sticky-card">
        <h3>Order Summary</h3>
        
      <div class="summary-totals-block">
          <div class="summary-row">
            <span>Items Subtotal</span>
            <span id="summarySubtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span class="free-text">Complimentary</span>
          </div>
          <div class="summary-row">
            <span>Estimated Taxes</span>
            <span>$0.00</span>
          </div>
          <div class="summary-row total-row">
            <span>Total due</span>
            <span id="summaryTotal">$0.00</span>
          </div>
        </div>
      </div>
    </aside>

  </main>

  <!-- Load Global Cart Engine Script First -->
  <script src="js/cart.js"></script>

  <!-- Checkout Computation Management Script -->
  <script>
  document.addEventListener('DOMContentLoaded', () => {

    const subtotalElement =
      document.getElementById('summarySubtotal');

    const totalElement =
      document.getElementById('summaryTotal');

    const checkoutForm =
      document.getElementById('checkoutForm');

    const toast =
      document.getElementById('toastNotification');

    // ===============================
    // CALCULATE TOTALS
    // ===============================
    const cartItems =
      (typeof getCartItems === 'function')
        ? getCartItems()
        : [];

    const runningSubtotal =
      cartItems.reduce((sum, item) => {
        return sum + (item.price * item.quantity);
      }, 0);

    const formatted =
      `$${runningSubtotal.toFixed(2)}`;

    subtotalElement.textContent = formatted;
    totalElement.textContent = formatted;

    // ===============================
    // PLACE ORDER
    // ===============================
    checkoutForm.addEventListener('submit', (e) => {

      e.preventDefault();

      // Show toast
      toast.textContent =
        'Order placed successfully ✓';

      toast.classList.add('show');

      // Clear cart
      localStorage.removeItem('studioFitCart');

      // Redirect after short delay
      setTimeout(() => {

        toast.classList.remove('show');

        window.location.href = 'index.html';

      }, 2200);
    });
  });
</script>
<div id="toastNotification" class="toast-notification"></div>
</body>
</html>
